services:
  app:
    container_name: alpincurry
    build:
      context: .
      dockerfile: .docker/v2/php/8.4/nginx/Dockerfile
      target: production
      args:
        DOCKER_RESOURCES_PATH: .docker/v2/common
        PROJECT_BUILD_HOOKS_PATH: .scripts/.docker-snippets/php
        JS_RUNTIME_REQUIRE_NODE: "true"
        JS_RUNTIME_NODE_VERSION: "24"
        PHP_EXT_XDEBUG: "false"
        ENABLE_HEALTHCHECK: "true"
        PHP_EXT_GD: "true"
        PHP_EXT_IMAGICK: "true"
        PHP_EXT_VIPS: "true"

    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        delay: 30s
#      resources:
#        limits:
#          cpus: '0.50'
#          memory: 512M
#        reservations:
#          cpus: '0.10'
#          memory: 128M
    restart: always
    ports:
      - '${APP_PORT:-8150}:80'
    environment:
      PUID: ${WWWUSER:-1000}
      PGID: ${WWWGROUP:-1000}
    networks:
      - traefik
    volumes:
      # Production configs (override baked-in defaults)
      - './.scripts/.docker-snippets/production/nginx/nginx.conf:/etc/nginx/nginx.conf:ro'
      - './.scripts/.docker-snippets/production/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro'
      - './.scripts/.docker-snippets/production/php/php.ini:/usr/local/etc/php/conf.d/99-production.ini:ro'
      - './.scripts/.docker-snippets/production/php/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro'
      # Persistent storage (logs, cache, uploads, database, content)
      - './storage/logs/:/var/www/html/storage/logs:rw'
      - './storage/app:/var/www/html/storage/app'
      - './storage/framework:/var/www/html/storage/framework'
      - './database:/var/www/html/database'
      - './.env:/var/www/html/.env:ro'
    labels:
      # --- Traefik Configuration ---
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      # HTTPS Router
      - "traefik.http.routers.alpincurry.rule=Host(`alpincurry.it`) || Host(`www.alpincurry.it`)"
      - "traefik.http.routers.alpincurry.entrypoints=websecure"
      - "traefik.http.routers.alpincurry.tls.certresolver=lets-encrypt"
      - "traefik.http.routers.alpincurry.tls=true"
      - "traefik.http.services.alpincurry.loadbalancer.server.port=80"
      # HTTP to HTTPS Redirect
      - "traefik.http.middlewares.alpincurry-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.alpincurry-http.rule=Host(`alpincurry.it`) || Host(`www.alpincurry.it`)"
      - "traefik.http.routers.alpincurry-http.entrypoints=web"
      - "traefik.http.routers.alpincurry-http.middlewares=alpincurry-https-redirect"


networks:
  traefik:
    external: true
