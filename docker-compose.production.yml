services:
  app:
    container_name: geoendpoint_app
    build:
      context: .
      dockerfile: .docker/v2/php/8.4/nginx/Dockerfile
      target: production
      args:
        DOCKER_RESOURCES_PATH: .docker/v2/common
        PROJECT_BUILD_HOOKS_PATH: .scripts/.docker-snippets/php
        JS_RUNTIME_REQUIRE_NODE: "true"
        JS_RUNTIME_NODE_VERSION: "24"
        JS_RUNTIME_REQUIRE_YARN: "true"
        PHP_EXT_PDO_PGSQL: "true"
        PHP_EXT_PGSQL: "true"
        PHP_EXT_REDIS: "true"
        PHP_EXT_XDEBUG: "false"
        INSTALL_DB_PGSQL_CLIENT: "true"
        ENABLE_HEALTHCHECK: "true"
    restart: always
    ports:
      - '${APP_PORT:-8150}:80'
    environment:
      PUID: ${WWWUSER:-1000}
      PGID: ${WWWGROUP:-1000}
    networks:
      - geoendpoint_net
      - traefik
    volumes:
      # Production configs (override baked-in defaults)
      - './.scripts/.docker-snippets/production/nginx/nginx.conf:/etc/nginx/nginx.conf:ro'
      - './.scripts/.docker-snippets/production/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro'
      - './.scripts/.docker-snippets/production/php/php.ini:/usr/local/etc/php/conf.d/99-production.ini:ro'
      - './.scripts/.docker-snippets/production/php/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro'
      # s6 services (queue worker + scheduler)
#      - './.scripts/.docker-snippets/s6/services.d/queue-worker:/etc/services.d/queue-worker:ro'
#      - './.scripts/.docker-snippets/s6/services.d/scheduler:/etc/services.d/scheduler:ro'
      # Persistent storage (logs, cache, uploads, database, content)
      - 'storage_logs:/var/www/html/storage/logs'
      - 'storage_app:/var/www/html/storage/app'
      - 'storage_framework:/var/www/html/storage/framework'
      - 'database:/var/www/html/database'
      - 'content:/var/www/html/content'
      - './.env:/var/www/html/.env:ro'
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    labels:
      # --- Traefik Configuration ---
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      # HTTPS Router
      - "traefik.http.routers.geoendpoint.rule=Host(`fastgeo.net`)"
      - "traefik.http.services.geoendpoint.loadbalancer.server.port=80"
      - "traefik.http.routers.geoendpoint.entrypoints=websecure"
      - "traefik.http.routers.geoendpoint.tls.certresolver=lets-encrypt"
      - "traefik.http.routers.geoendpoint.tls=true"
      # HTTP to HTTPS Redirect
      - "traefik.http.middlewares.geoendpoint-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.geoendpoint-redirect-https.redirectscheme.permanent=true"
      - "traefik.http.routers.geoendpoint-http.rule=Host(`fastgeo.net`)"
      - "traefik.http.routers.geoendpoint-http.entrypoints=web"
      - "traefik.http.routers.geoendpoint-http.middlewares=geoendpoint-redirect-https"

volumes:
  storage_logs:
  storage_app:
  storage_framework:
  database:
  content:

networks:
  geoendpoint_net:
    driver: bridge
  traefik:
    external: true
