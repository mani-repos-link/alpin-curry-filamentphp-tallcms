services:
    app:
        container_name: ${APP_SERVICE_NAME:-peak-app}
        build:
            context: .
            dockerfile: .docker/v2/php/8.4/nginx/Dockerfile
            target: ${PHP_DOCKER_TARGET:-development}
            args:
                DOCKER_RESOURCES_PATH: .docker/v2/common
                #PROJECT_BUILD_HOOKS_PATH: ".scripts/.docker-snippets/builds"
                JS_RUNTIME_REQUIRE_NODE: "true"
                JS_RUNTIME_NODE_VERSION: "24"
                JS_RUNTIME_REQUIRE_YARN: "true"
                PHP_EXT_PDO_PGSQL: "false"
                PHP_EXT_PGSQL: "false"
                INSTALL_DB_PGSQL_CLIENT: "false"
                PHP_EXT_REDIS: "true"
                PHP_EXT_XDEBUG: "false"
                ENABLE_HEALTHCHECK: "true"
                PHP_EXT_GD: "true"
        extra_hosts:
            - "host.docker.internal:host-gateway"
        ports:
            - '${APP_PORT:-8080}:80'
            - '${VITE_PORT}:${VITE_PORT}'
        environment:
            PUID: ${WWWUSER:-1000}
            PGID: ${WWWGROUP:-1000}
            VITE_PORT: '${VITE_PORT:-5173}'
            PHP_IDE_CONFIG: "serverName=docker" # Must match the server name in PHPStorm's server configuration in case of using Xdebug
        networks:
            - optimesh
        volumes:
            - '.:/var/www/html' # this adds/attach/mount the current directory to the container, so container reflects local changes
            - './.scripts/.docker-snippets/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf' # custom nginx configuration
            - './.scripts/.docker-snippets/php/php.ini:/usr/local/etc/php/conf.d/99-custom.ini' # customize php configuration according to your needs if needed
            - './.scripts/.docker-snippets/s6/cont-init.d/99-install-stripe.sh:/etc/cont-init.d/99-install-stripe' # Install Stripe CLI on startup

